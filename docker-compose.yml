version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: todo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tododb
    ports:
      - "5433:5432"
    volumes:
      - todo_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: todo_redis
    ports:
      - "6379:6379"

volumes:
  todo_pgdata: